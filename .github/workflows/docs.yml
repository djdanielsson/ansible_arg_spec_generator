name: Documentation
permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]

jobs:
  check-docs:
    name: Check Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Check README completeness
        run: |
          echo "📚 Checking README completeness..."
          REQUIRED_SECTIONS=("Installation" "Usage" "Examples" "Contributing" "License")
          MISSING_SECTIONS=()
          for section in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -q "## $section" README.md; then
              MISSING_SECTIONS+=("$section")
            fi
          done
          if [ ${#MISSING_SECTIONS[@]} -gt 0 ]; then
            echo "❌ Missing required README sections:"
            printf '%s\n' "${MISSING_SECTIONS[@]}"
            exit 1
          fi
          echo "✅ All required README sections present"

      - name: Check for broken links
        run: |
          echo "🔗 Checking for broken internal links..."
          FILE_REFS=$(grep -o '\[.*\](\.\/[^)]*\.md)' README.md | sed 's/.*(\.\///' | sed 's/)//' || echo "")
          if [ -n "$FILE_REFS" ]; then
            for ref in $FILE_REFS; do
              if [ ! -f "$ref" ]; then
                echo "❌ Broken link: $ref"
                exit 1
              fi
            done
          fi
          echo "✅ No broken internal links found"
      
  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Spell check with CSpell
        uses: streetsidesoftware/cspell-action@9c7145a5e625e30cb68f6932b379e17eb024d974 # v8
        with:
          files: "**/*.md"
          config: .cspell.json
